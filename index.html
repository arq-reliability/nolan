<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Nolan Spotter</title><link rel='stylesheet' href='style.css'></head><body><div id='startScreen'><h1>Nolan Spotter</h1><input id='player1Name' placeholder='Player 1 name'><input id='player2Name' placeholder='Player 2 name'><button onclick='startGame(false)'>Start Game - Continue Scores</button><button onclick='startGame(true)'>Start Game - Reset Scores</button></div><div id='gameScreen' style='display:none;'><div class='player'><h2 id='p1Label'></h2><div id='score1' class='score'>0</div><button onclick='addPoint(1)'>+1 Nolan</button><button onclick='badCall(1)'>-10 False Call</button></div><div class='player'><h2 id='p2Label'></h2><div id='score2' class='score'>0</div><button onclick='addPoint(2)'>+1 Nolan</button><button onclick='badCall(2)'>-10 False Call</button></div><button onclick='endGame()'>End Game</button></div><div id='endScreen' style='display:none;'><h1>Game Ended</h1><p id='finalScore'></p><button onclick='showStart()'>New Game</button></div><script src='app.js'></script></body></html>
